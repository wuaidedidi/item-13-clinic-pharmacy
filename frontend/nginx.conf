server {
  listen 3013;
  server_name _;

  root /app/frontend/dist;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:8013/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /auth/ {
    proxy_pass http://127.0.0.1:8013/auth/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /health {
    proxy_pass http://127.0.0.1:8013/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
